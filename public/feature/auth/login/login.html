<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>
  <main class="login-page">
    <section class="login-card">
        <header class="login-header">
            <img src="img/logo-rusteze.png" alt="Rusteze Logo" class="logo">
            <h2>Panel de Control</h2>
            <p>Introduce tus credenciales de mecánico</p>
        </header>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="rayo@mcqueen.com">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" id="btnLogin">Encender Motores</button>

            <div class="form-options">
                <p class="register-link">¿Nuevo en el equipo? <a href="../register/register.html">Regístrate aquí</a></p>
                <a href="../forgot-password.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>
            
            <p id="error-message" class="hidden"></p>
        </form>

        <hr class="divider">

        <footer class="login-footer">
            <div class="footer-content">
                <div class="contact-info">
                    <h4>Contacto Técnica</h4>
                    <p> 555-RUSTEZE</p>
                    <p> Radiator Springs, USA</p>
                </div>
                <div class="social-links">
                    <h4>Síguenos</h4>
                    <a href="#"> Web Oficial</a>
                    <a href="#"> Copa Piston</a>
                </div>
            </div>
            <p class="copyright">&copy; 2026 Rust-eze Medicating Bumper Ointment</p>
        </footer>
    </section>
</main>

<script src="js/auth.js"></script>
</body>
</html>
