<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acceso</title>
    <link rel="stylesheet" href="css/style.css"> 
</head>
<body>
  <main class="login-page">
    <section class="login-card">
        <header class="login-header">
            <img src="img/logo-rusteze.png" alt="Rusteze Logo" class="logo">
            <h2>¿Problemas en el motor?</h2>
            <p>Introduce tu correo para enviarte una grúa de recuperación.</p>
        </header>

        <form id="forgotForm">
            <div class="input-group">
                <label for="email">Correo Electrónico de Mecánico</label>
                <input type="email" id="email" name="email" required placeholder="rayo@mcqueen.com">
            </div>

            <button type="submit" id="btnReset">Enviar Auxilio Vial </button>

            <div class="form-options">
                <p class="login-link">¿Recordaste la clave? <a href="./rusteze_taller_mecanico.html">Volver al Garage</a></p>
            </div>
            
            <p id="error-message" class="hidden"></p>
        </form>

        <hr class="divider">

        <footer class="login-footer">
            <div class="footer-content">
                <div class="contact-info">
                    <h4>Asistencia 24/7</h4>
                    <p> 555-RUSTEZE</p>
                </div>
                <div class="social-links">
                    <h4>Radiator Springs</h4>
                    <p> Ruta 66</p>
                </div>
            </div>
            <p class="copyright">&copy; 2026 Rust-eze Medicating Bumper Ointment</p>
        </footer>
    </section>
</main>

<script src="js/forgot.js"></script>
</body>
</html>
